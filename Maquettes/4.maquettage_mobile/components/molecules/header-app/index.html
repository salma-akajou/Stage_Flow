<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Molecule: Header App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../Charte_graphique/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' }
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-slate-100">
    <div class="max-w-md mx-auto space-y-4">
        <!-- Header - Stagiaire -->
        <header class="bg-white px-5 pt-safe pb-4 border-b border-slate-200 sticky top-0 z-40">
            <div class="flex justify-between items-center h-14">
                <a class="flex items-center gap-2 group" href="#">
                    <div class="w-9 h-9 bg-primary-600 rounded-xl flex items-center justify-center shadow-lg shadow-primary-500/20">
                        <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <div class="flex flex-col leading-none">
                        <span class="text-xl font-bold text-slate-900 tracking-tight">Stage<span class="text-primary-600">Flow</span></span>
                    </div>
                </a>
                <button class="w-10 h-10 rounded-full border border-slate-200 bg-white overflow-hidden active:scale-95 transition-transform">
                    <img class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?auto=format&fit=facearea&facepad=2&w=100&h=100" alt="Avatar">
                </button>
            </div>
        </header>
        
        <!-- Header - Enterprise -->
        <header class="bg-white px-5 pt-safe pb-4 border-b border-slate-200">
            <div class="flex justify-between items-center h-14">
                <a class="flex items-center gap-2" href="#">
                    <div class="w-9 h-9 flex items-center justify-center">
                        <img src="../images/logo_app.png" alt="StageFlow Logo" class="w-full h-full object-contain">
                    </div>
                    <span class="text-xl font-bold text-slate-900 tracking-tight">StageFlow</span>
                </a>
                <button class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center active:scale-95 transition-transform relative">
                    <svg class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                    </svg>
                    <span class="absolute top-0 right-0 w-4 h-4 bg-red-500 rounded-full text-[9px] text-white flex items-center justify-center font-bold">3</span>
                </button>
            </div>
        </header>
    </div>
</body>
</html>
