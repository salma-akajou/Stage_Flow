<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Molecule: Card Offer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../Charte_graphique/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: 'var(--color-primary-50)', 100: 'var(--color-primary-100)', 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' },
                        semantic: { success: 'var(--color-success-500)', warning: 'var(--color-warning-500)' }
                    }
                }
            }
        };
    </script>
</head>
<body class="p-4 bg-slate-50">
    <div class="max-w-sm mx-auto space-y-4">
        <h2 class="text-lg font-bold text-slate-900 mb-4">Offer Cards</h2>
        
        <!-- Featured Card -->
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200 active:scale-[0.98] transition-all">
            <div class="flex justify-between items-start mb-3">
                <div class="w-12 h-12 bg-primary-100 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-primary-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                </div>
                <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-semantic-success/10 text-semantic-success">Nouveau</span>
            </div>
            <h3 class="text-lg font-bold text-slate-900 mb-1">Développeur Web Full Stack</h3>
            <p class="text-sm text-slate-500 mb-3">TechCorp • Casablanca</p>
            <div class="flex flex-wrap gap-2 mb-4">
                <span class="px-2 py-1 bg-slate-100 text-slate-600 text-xs rounded-lg">6 mois</span>
                <span class="px-2 py-1 bg-slate-100 text-slate-600 text-xs rounded-lg">3000 MAD/mois</span>
                <span class="px-2 py-1 bg-slate-100 text-slate-600 text-xs rounded-lg">Remote</span>
            </div>
            <button class="w-full py-3 rounded-xl bg-primary-600 text-white font-semibold text-sm active:bg-primary-700 transition-colors">Postuler</button>
        </div>
        
        <!-- Compact Card -->
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 flex items-center gap-4 active:scale-[0.98] transition-all">
            <div class="w-14 h-14 bg-primary-50 rounded-xl flex items-center justify-center shrink-0">
                <span class="text-xl font-bold text-primary-600">TC</span>
            </div>
            <div class="flex-1 min-w-0">
                <h3 class="text-base font-bold text-slate-900 truncate">Stage Marketing Digital</h3>
                <p class="text-sm text-slate-500">Agence Marketing • Rabat</p>
                <div class="flex items-center gap-2 mt-1">
                    <span class="text-xs text-semantic-warning font-medium">Postuler avant demain</span>
                </div>
            </div>
            <button class="w-10 h-10 rounded-full bg-primary-100 text-primary-600 flex items-center justify-center shrink-0 active:scale-95 transition-transform">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                </svg>
            </button>
        </div>
    </div>
</body>
</html>
