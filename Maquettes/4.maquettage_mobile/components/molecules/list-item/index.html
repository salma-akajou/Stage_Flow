<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Molecule: List Item</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../Charte_graphique/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: 'var(--color-primary-50)', 100: 'var(--color-primary-100)', 600: 'var(--color-primary-600)' },
                        semantic: { success: 'var(--color-success-500)', error: 'var(--color-error-500)', warning: 'var(--color-warning-500)' }
                    }
                }
            }
        };
    </script>
</head>
<body class="p-4 bg-slate-50">
    <div class="max-w-sm mx-auto space-y-4">
        <h2 class="text-lg font-bold text-slate-900 mb-4">List Items</h2>
        
        <!-- Application Item -->
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 active:scale-[0.98] transition-all">
            <div class="flex items-start gap-3">
                <div class="w-12 h-12 bg-primary-50 rounded-xl flex items-center justify-center shrink-0">
                    <span class="text-lg font-bold text-primary-600">TC</span>
                </div>
                <div class="flex-1 min-w-0">
                    <h3 class="text-sm font-bold text-slate-900">Développeur Frontend</h3>
                    <p class="text-xs text-slate-500 mt-0.5">TechCorp • Postulé il y a 2j</p>
                    <div class="flex items-center gap-2 mt-2">
                        <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium bg-semantic-warning/10 text-semantic-warning">En attente</span>
                    </div>
                </div>
                <button class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center shrink-0 active:scale-95 transition-transform">
                    <svg class="w-4 h-4 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
                    </svg>
                </button>
            </div>
        </div>
        
        <!-- History Item -->
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 active:scale-[0.98] transition-all">
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs font-medium text-slate-500">15 Mars 2024</span>
                <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-medium bg-semantic-success/10 text-semantic-success">Accepté</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-primary-100 rounded-lg flex items-center justify-center">
                    <span class="text-sm font-bold text-primary-600">DM</span>
                </div>
                <div class="flex-1">
                    <h3 class="text-sm font-bold text-slate-900">Designer UI/UX</h3>
                    <p class="text-xs text-slate-500">DesignMark • Stage 4 mois</p>
                </div>
            </div>
        </div>
        
        <!-- Candidate Item -->
        <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200 active:scale-[0.98] transition-all">
            <div class="flex items-center gap-3">
                <img class="w-12 h-12 rounded-full object-cover" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=facearea&facepad=2&w=100&h=100" alt="Candidate">
                <div class="flex-1 min-w-0">
                    <h3 class="text-sm font-bold text-slate-900">Sarah Benali</h3>
                    <p class="text-xs text-slate-500 truncate">Développeur Full Stack • 3 ans exp</p>
                    <div class="flex items-center gap-1 mt-1">
                        <svg class="w-3 h-3 text-yellow-400" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                        <span class="text-xs font-medium text-slate-600">4.8</span>
                    </div>
                </div>
                <div class="flex gap-1">
                    <button class="w-8 h-8 rounded-full bg-semantic-success/10 text-semantic-success flex items-center justify-center active:scale-95 transition-transform">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    </button>
                    <button class="w-8 h-8 rounded-full bg-semantic-error/10 text-semantic-error flex items-center justify-center active:scale-95 transition-transform">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
