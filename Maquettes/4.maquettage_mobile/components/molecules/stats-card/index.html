<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Molecule: Stats Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../Charte_graphique/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: 'var(--color-primary-50)', 100: 'var(--color-primary-100)', 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' },
                        semantic: { success: 'var(--color-success-500)', warning: 'var(--color-warning-500)' }
                    }
                }
            }
        };
    </script>
</head>
<body class="p-4 bg-slate-50">
    <div class="max-w-sm mx-auto space-y-4">
        <h2 class="text-lg font-bold text-slate-900 mb-4">Stats Cards</h2>
        
        <!-- Stats Grid -->
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                <div class="w-10 h-10 bg-primary-50 rounded-xl flex items-center justify-center mb-3">
                    <svg class="w-5 h-5 text-primary-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                </div>
                <span class="text-2xl font-bold text-slate-900">12</span>
                <p class="text-xs text-slate-500 mt-0.5">Candidatures</p>
            </div>
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                <div class="w-10 h-10 bg-semantic-success/10 rounded-xl flex items-center justify-center mb-3">
                    <svg class="w-5 h-5 text-semantic-success" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <span class="text-2xl font-bold text-slate-900">3</span>
                <p class="text-xs text-slate-500 mt-0.5">Entretiens</p>
            </div>
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                <div class="w-10 h-10 bg-semantic-warning/10 rounded-xl flex items-center justify-center mb-3">
                    <svg class="w-5 h-5 text-semantic-warning" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                </div>
                <span class="text-2xl font-bold text-slate-900">5</span>
                <p class="text-xs text-slate-500 mt-0.5">En attente</p>
            </div>
            <div class="bg-white rounded-2xl p-4 shadow-sm border border-slate-200">
                <div class="w-10 h-10 bg-primary-100 rounded-xl flex items-center justify-center mb-3">
                    <svg class="w-5 h-5 text-primary-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                </div>
                <span class="text-2xl font-bold text-slate-900">156</span>
                <p class="text-xs text-slate-500 mt-0.5">Vues profil</p>
            </div>
        </div>
        
        <!-- Progress Stats -->
        <div class="bg-white rounded-2xl p-5 shadow-sm border border-slate-200">
            <h3 class="text-sm font-bold text-slate-900 mb-4">Progression</h3>
            <div class="space-y-4">
                <div>
                    <div class="flex justify-between mb-1.5">
                        <span class="text-xs font-medium text-slate-600">Profil complet</span>
                        <span class="text-xs font-bold text-primary-600">85%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2">
                        <div class="bg-primary-600 h-2 rounded-full" style="width: 85%"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between mb-1.5">
                        <span class="text-xs font-medium text-slate-600">CV uploadé</span>
                        <span class="text-xs font-bold text-semantic-success">100%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2">
                        <div class="bg-semantic-success h-2 rounded-full" style="width: 100%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
