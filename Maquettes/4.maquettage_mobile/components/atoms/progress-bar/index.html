<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atom: Progress Bar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../Charte_graphique/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 100: 'var(--color-primary-100)', 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' },
                        semantic: { success: 'var(--color-success-500)', warning: 'var(--color-warning-500)' }
                    }
                }
            }
        };
    </script>
</head>
<body class="p-6 bg-slate-50">
    <div class="max-w-sm mx-auto space-y-6">
        <h2 class="text-lg font-bold text-slate-900 mb-4">Progress Bars</h2>
        
        <div>
            <div class="flex justify-between mb-2">
                <span class="text-sm font-medium text-slate-700">Complétion du profil</span>
                <span class="text-sm font-bold text-primary-600">75%</span>
            </div>
            <div class="w-full bg-primary-100 rounded-full h-2.5">
                <div class="bg-primary-600 h-2.5 rounded-full" style="width: 75%"></div>
            </div>
        </div>
        
        <div>
            <div class="flex justify-between mb-2">
                <span class="text-sm font-medium text-slate-700">Candidatures envoyées</span>
                <span class="text-sm font-bold text-semantic-success">12/20</span>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-2.5">
                <div class="bg-semantic-success h-2.5 rounded-full" style="width: 60%"></div>
            </div>
        </div>
        
        <div>
            <div class="flex justify-between mb-2">
                <span class="text-sm font-medium text-slate-700">Temps restant</span>
                <span class="text-sm font-bold text-semantic-warning">2j 4h</span>
            </div>
            <div class="w-full bg-slate-200 rounded-full h-2.5">
                <div class="bg-semantic-warning h-2.5 rounded-full" style="width: 30%"></div>
            </div>
        </div>
        
        <!-- Segmented Progress -->
        <div class="flex gap-1">
            <div class="flex-1 h-2 bg-primary-600 rounded-full"></div>
            <div class="flex-1 h-2 bg-primary-600 rounded-full"></div>
            <div class="flex-1 h-2 bg-primary-600 rounded-full"></div>
            <div class="flex-1 h-2 bg-slate-200 rounded-full"></div>
            <div class="flex-1 h-2 bg-slate-200 rounded-full"></div>
        </div>
    </div>
</body>
</html>
