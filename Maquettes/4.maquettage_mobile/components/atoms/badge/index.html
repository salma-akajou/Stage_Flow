<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Atom: Badge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../Charte_graphique/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: { 50: 'var(--color-primary-50)', 100: 'var(--color-primary-100)', 500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)' },
                        semantic: { success: 'var(--color-success-500)', error: 'var(--color-error-500)', warning: 'var(--color-warning-500)', info: 'var(--color-info-500)' }
                    }
                }
            }
        };
    </script>
</head>
<body class="p-6 bg-slate-50">
    <div class="max-w-sm mx-auto space-y-6">
        <h2 class="text-lg font-bold text-slate-900 mb-4">Badges & Indicators</h2>
        
        <div class="flex flex-wrap gap-2">
            <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-semantic-success/10 text-semantic-success">Accepté</span>
            <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-semantic-warning/10 text-semantic-warning">En attente</span>
            <span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-semantic-error/10 text-semantic-error">Refusé</span>
        </div>
        
        <div class="flex flex-wrap gap-2">
            <span class="inline-flex items-center px-3 py-1.5 rounded-full text-xs font-semibold bg-primary-100 text-primary-600">Nouveau</span>
            <span class="inline-flex items-center px-3 py-1.5 rounded-full text-xs font-semibold bg-primary-500 text-white">Populaire</span>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-semantic-success"></span>
                <span class="text-sm text-slate-600">En ligne</span>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-semantic-warning"></span>
                <span class="text-sm text-slate-600">Occupé</span>
            </div>
        </div>
    </div>
</body>
</html>
