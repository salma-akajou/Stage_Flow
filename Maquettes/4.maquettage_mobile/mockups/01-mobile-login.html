<!DOCTYPE html>
<html lang="fr" class="bg-slate-900 border-x border-slate-200 shadow-2xl h-[100dvh] mx-auto w-full max-w-[430px] overflow-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>01. Connexion - StageFlow Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../Charte_graphique/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        primary: {
                            50: 'var(--color-primary-50)', 100: 'var(--color-primary-100)', 200: 'var(--color-primary-200)',
                            500: 'var(--color-primary-500)', 600: 'var(--color-primary-600)', 700: 'var(--color-primary-700)'
                        },
                        semantic: { error: 'var(--color-error-500)' }
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-slate-50 h-[100dvh] flex flex-col font-sans">
    <main class="flex-1 flex flex-col justify-center px-6 py-8">
        <div class="mb-8">
            <div class="w-20 h-20 mx-auto mb-6">
                <img src="../images/logo_app.png" alt="StageFlow Logo" class="w-full h-full object-contain">
            </div>
            <h1 class="text-2xl font-bold text-center text-slate-900 mb-2">StageFlow</h1>
            <p class="text-sm text-center text-slate-500">Connectez-vous pour trouver votre stage idéal</p>
        </div>

        <form class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                <input type="email" class="w-full py-3.5 px-4 rounded-xl border border-slate-200 bg-white text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all" placeholder="exemple@email.com">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Mot de passe</label>
                <input type="password" class="w-full py-3.5 px-4 rounded-xl border border-slate-200 bg-white text-sm text-slate-800 placeholder-slate-400 focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-200 transition-all" placeholder="••••••••">
            </div>
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2">
                    <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-primary-600 focus:ring-primary-500">
                    <span class="text-slate-600">Se souvenir de moi</span>
                </label>
                <a href="#" class="text-primary-600 font-medium">Mot de passe oublié?</a>
            </div>
            <button type="button" class="w-full py-3.5 px-4 rounded-xl bg-primary-600 text-white font-semibold text-sm active:bg-primary-700 transition-colors">
                Se connecter
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-slate-600">
                Pas encore de compte? 
                <a href="#" class="text-primary-600 font-semibold">S'inscrire</a>
            </p>
        </div>

        <div class="mt-8 pt-6 border-t border-slate-200">
            <p class="text-xs text-center text-slate-400 mb-4">Ou continuer avec</p>
            <div class="flex gap-3">
                <button class="flex-1 py-3 rounded-xl border border-slate-200 bg-white flex items-center justify-center gap-2 active:bg-slate-50 transition-colors">
                    <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    <span class="text-sm font-medium text-slate-700">Google</span>
                </button>
                <button class="flex-1 py-3 rounded-xl border border-slate-200 bg-white flex items-center justify-center gap-2 active:bg-slate-50 transition-colors">
                    <svg class="w-5 h-5 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    <span class="text-sm font-medium text-slate-700">LinkedIn</span>
                </button>
            </div>
        </div>
    </main>
</body>
</html>
