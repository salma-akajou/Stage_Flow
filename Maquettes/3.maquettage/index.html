<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Kit Gallery - StageFlow</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.js" defer></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' },
                        secondary: { 500: '#14b8a6' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .nav-btn {
            @apply w-full text-left text-sm px-3 py-2.5 rounded-xl text-slate-600 hover:bg-primary-50 hover:text-primary-700 transition-all duration-200 flex items-center gap-2;
        }

        .nav-btn.active {
            @apply bg-primary-100 text-primary-700 font-semibold shadow-sm;
        }

        #preview-frame {
            transition: opacity 0.2s ease, width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body class="bg-slate-100 flex h-full overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-72 bg-white border-r border-slate-200 flex flex-col h-full flex-shrink-0 shadow-xl z-20">

                </div>
            </div>
            <!-- Viewport buttons -->
            <div class="flex bg-slate-100 rounded-xl p-1 text-[11px] font-semibold">
                <button onclick="resizeIframe('100%', this)"
                    class="flex-1 py-2 rounded-lg bg-white shadow-sm text-primary-700 vp-btn active-vp">Desktop</button>
                <button onclick="resizeIframe('768px', this)"
                    class="flex-1 py-2 rounded-lg hover:bg-white/50 text-slate-500 transition-all vp-btn">Tablet</button>
                <button onclick="resizeIframe('390px', this)"
                    class="flex-1 py-2 rounded-lg hover:bg-white/50 text-slate-500 transition-all vp-btn">Mobile</button>
            </div>
        </div>

        <!-- Navigation -->

                    <button

                    <button onclick="loadComponent('components/molecules/alert/index.html', '🧩 Molécule: Alert', this)"

                    <button onclick="loadComponent('mockups/admin/users.html', '⚙️ Mockup: Utilisateurs', this)"

        <div class="p-6 border-t border-slate-100 bg-slate-50/50">
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest italic">Phase: Component Validation
            </p>
        </div>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full bg-slate-100 overflow-hidden relative">
        <div
            class="bg-white/80 backdrop-blur-md border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm z-10 shrink-0">
            <div class="flex items-center gap-4 min-w-0">
                <div id="component-icon"
                    class="w-8 h-8 rounded-lg bg-slate-100 flex items-center justify-center text-sm shrink-0">👋</div>
                <h2 id="component-title" class="text-sm font-bold text-slate-800 truncate">Sélectionnez un composant
                </h2>
            </div>
            <a id="open-new-tab" href="#" target="_blank"
                class="hidden shrink-0 text-xs px-4 py-2 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 text-slate-600 flex items-center gap-2 transition-all shadow-sm">
                <span>Plein écran</span>
            </a>
        </div>

        <div class="flex-1 overflow-hidden flex items-stretch justify-center relative p-8"
            style="background-image: radial-gradient(#cbd5e1 1px, transparent 1px); background-size: 24px 24px;">
            <div id="welcome-state"
                class="absolute inset-0 flex flex-col items-center justify-center gap-6 text-center z-0">
                <h2 class="font-heading font-bold text-3xl text-slate-900">Bibliothèque StageFlow</h2>
                <p class="text-slate-500 text-sm max-w-md">Veuillez explorer les atomes et molécules validés.</p>
            </div>
            <iframe id="preview-frame" src=""
                class="w-full h-full border-0 bg-white shadow-2xl rounded-2xl opacity-0 relative z-10"></iframe>
        </div>
    </main>

    <script>
        let currentBtn = null;
        function loadComponent(path, title, btn) {
            const frame = document.getElementById('preview-frame');
            const titleEl = document.getElementById('component-title');
            const welcome = document.getElementById('welcome-state');
            const iconEl = document.getElementById('component-icon');
            const openLink = document.getElementById('open-new-tab');

            if (currentBtn) currentBtn.classList.remove('active');
            btn.classList.add('active');
            currentBtn = btn;

            welcome.style.display = 'none';
            frame.classList.add('opacity-0');

            setTimeout(() => {
                frame.src = path;
                titleEl.textContent = title;
                iconEl.textContent = btn.querySelector('span').textContent;
                openLink.href = path;
                openLink.classList.remove('hidden');
                frame.onload = () => frame.classList.remove('opacity-0');
            }, 100);
        }
        function resizeIframe(width, btn) {
            document.querySelectorAll('.vp-btn').forEach(b => b.classList.remove('bg-white', 'shadow-sm', 'text-primary-700'));
            btn.classList.add('bg-white', 'shadow-sm', 'text-primary-700');
            document.getElementById('preview-frame').style.width = width;
        }
    </script>
</body>

</html>
