<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-10 bg-white space-y-8 flex flex-col items-center">
    <div class="space-y-4 text-center">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Spinners (Chargement)</h3>
        <div class="flex items-center gap-6">
            <div class="animate-spin inline-block size-6 border-[3px] border-current border-t-transparent text-indigo-600 rounded-full"
                role="status" aria-label="loading">
                <span class="sr-only">Loading...</span>
            </div>
            <div class="animate-spin inline-block size-8 border-[3px] border-current border-t-transparent text-slate-400 rounded-full"
                role="status" aria-label="loading">
                <span class="sr-only">Loading...</span>
            </div>
            <div class="animate-spin inline-block size-10 border-[3px] border-indigo-200 border-t-indigo-600 rounded-full"
                role="status" aria-label="loading">
                <span class="sr-only">Loading...</span>
            </div>
        </div>
    </div>
</body>

</html>
