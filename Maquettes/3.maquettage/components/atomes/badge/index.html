<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-10 bg-white space-y-8">
    <div class="space-y-4">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Badges d'état</h3>
        <div class="flex flex-wrap gap-3">
            <span
                class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800">IT
                / Digital</span>
            <span
                class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800">
                <span class="size-1.5 inline-block rounded-full bg-emerald-800"></span>
                Accepté
            </span>
            <span
                class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-amber-100 text-amber-800">
                <span class="size-1.5 inline-block rounded-full bg-amber-800"></span>
                En attente
            </span>
            <span
                class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-medium bg-rose-100 text-rose-800">
                <span class="size-1.5 inline-block rounded-full bg-rose-800"></span>
                Refusé
            </span>
        </div>
    </div>

    <div class="space-y-4">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Tags Durée</h3>
        <div class="flex flex-wrap gap-3">
            <span
                class="py-1 px-2 inline-flex items-center gap-x-1 text-xs font-medium bg-slate-100 text-slate-800 rounded-lg border border-slate-200">
                <svg class="flex-shrink-0 size-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                2 mois
            </span>
            <span
                class="py-1 px-2 inline-flex items-center gap-x-1 text-xs font-medium bg-slate-100 text-slate-800 rounded-lg border border-slate-200">
                <svg class="flex-shrink-0 size-3" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <polyline points="12 6 12 12 16 14" />
                </svg>
                4 mois
            </span>
        </div>
    </div>
</body>

</html>
