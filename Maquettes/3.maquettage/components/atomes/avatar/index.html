<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-10 bg-white space-y-8">
    <div class="space-y-4">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Avatars Étudiants</h3>
        <div class="flex items-center gap-4">
            <img class="inline-block size-[38px] rounded-full"
                src="https://images.unsplash.com/photo-1568602471122-7832951cc4c5?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=facearea&facepad=2&w=300&h=300&q=80"
                alt="Avatar">
            <img class="inline-block size-[46px] rounded-full"
                src="https://images.unsplash.com/photo-1531927557220-a9e23c1e4794?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=facearea&facepad=2&w=300&h=300&q=80"
                alt="Avatar">
            <div
                class="inline-flex items-center justify-center size-[46px] rounded-full bg-indigo-600 text-white font-bold">
                SA</div>
        </div>
    </div>

    <div class="space-y-4">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Logos Entreprises (Square)</h3>
        <div class="flex items-center gap-4">
            <div
                class="size-12 rounded-xl border border-slate-200 bg-white flex items-center justify-center p-2 shadow-sm">
                <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Company">
            </div>
            <div
                class="size-12 rounded-xl border border-slate-200 bg-white flex items-center justify-center p-2 shadow-sm">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.png" alt="Company">
            </div>
        </div>
    </div>
</body>

</html>
