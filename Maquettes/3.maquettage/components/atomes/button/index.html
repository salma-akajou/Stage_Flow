<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="p-10 bg-white space-y-12">

    <!-- Sizes -->
    <div class="space-y-4">
        <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">Tailles de boutons</h3>
        <div class="flex items-center gap-4">
            <button
                class="py-1 px-2 inline-flex items-center gap-x-2 text-[10px] font-semibold rounded-md bg-indigo-600 text-white">Petit
                (XS)</button>
            <button
                class="py-2 px-3 inline-flex items-center gap-x-2 text-xs font-semibold rounded-lg bg-indigo-600 text-white">Standard
                (SM)</button>
            <button
                class="py-3 px-4 inline-flex items-center gap-x-2 text-sm font-semibold rounded-xl bg-indigo-600 text-white">Large
                (MD)</button>
        </div>
    </div>

    <!-- Variants -->
    <div class="space-y-4">
        <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">Variantes de Styles</h3>
        <div class="flex items-center gap-4">
            <button
                class="py-2 px-3 text-xs font-semibold rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 transition">Principal</button>
            <button
                class="py-2 px-3 text-xs font-semibold rounded-lg border border-slate-200 bg-white text-slate-800 hover:bg-slate-50 transition">Outline</button>
            <button
                class="py-2 px-3 text-xs font-semibold rounded-lg bg-indigo-50 text-indigo-600 hover:bg-indigo-100 transition">Soft</button>
            <button
                class="py-2 px-3 text-xs font-semibold rounded-lg text-indigo-600 hover:bg-indigo-50 transition">Ghost</button>
        </div>
    </div>

    <!-- Icon-only (User Request) -->
    <div class="space-y-4">
        <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">Actions (Icon-only)</h3>
        <div class="flex items-center gap-4">
            <button
                class="size-8 inline-flex justify-center items-center rounded-lg border border-slate-200 bg-white text-indigo-600 hover:bg-slate-50 transition">
                <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" />
                    <path d="m15 5 4 4" />
                </svg>
            </button>
            <button
                class="size-8 inline-flex justify-center items-center rounded-lg border border-rose-100 bg-rose-50 text-rose-600 hover:bg-rose-100 transition">
                <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 6h18" />
                    <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" />
                    <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" />
                    <line x1="10" x2="10" y1="11" y2="17" />
                    <line x1="14" x2="14" y1="11" y2="17" />
                </svg>
            </button>
            <button
                class="size-8 inline-flex justify-center items-center rounded-lg border border-slate-200 bg-indigo-600 text-white hover:bg-indigo-700 transition">
                <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14" />
                    <path d="M12 5v14" />
                </svg>
            </button>
        </div>
    </div>

    <!-- States -->
    <div class="space-y-4">
        <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">États Spéciaux</h3>
        <div class="flex items-center gap-4">
            <button disabled
                class="py-2 px-3 text-xs font-semibold rounded-lg bg-indigo-600 text-white opacity-50 cursor-not-allowed">Désactivé</button>
            <button
                class="py-2 px-3 text-xs font-semibold rounded-lg bg-indigo-600 text-white inline-flex items-center gap-2">
                <div class="animate-spin size-3 border-2 border-white border-t-transparent rounded-full"></div>
                Chargement...
            </button>
        </div>
    </div>

</body>

</html>
