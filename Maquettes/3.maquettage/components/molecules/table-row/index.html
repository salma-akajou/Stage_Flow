<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-10 bg-slate-100">
    <!-- Table Row Molecule -->
    <div class="flex flex-col">
        <div class="-m-1.5 overflow-x-auto">
            <div class="p-1.5 min-w-full inline-block align-middle">
                <div class="border rounded-2xl overflow-hidden bg-white border-slate-200">
                    <table class="min-w-full divide-y divide-slate-200">
                        <thead class="bg-slate-50 uppercase text-[10px] font-bold text-slate-400 tracking-widest">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-start">Étudiant</th>
                                <th scope="col" class="px-6 py-3 text-start">Offre</th>
                                <th scope="col" class="px-6 py-3 text-start">Date</th>
                                <th scope="col" class="px-6 py-3 text-start">Statut</th>
                                <th scope="col" class="px-6 py-3 text-end">Action</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-200">
                            <tr>
                                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-800">Salma Akajou
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">Développeur Front-end
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-600">04 Mars 2024</td>
                                <td class="px-6 py-4 whitespace-nowrap">
                                    <span
                                        class="inline-flex items-center gap-x-1.5 py-1 px-2.5 rounded-full text-xs font-medium bg-amber-100 text-amber-800">En
                                        attente</span>
                                </td>
                                <td class="px-6 py-4 whitespace-nowrap text-end text-sm font-medium">
                                    <button type="button"
                                        class="inline-flex items-center gap-x-2 text-sm font-semibold rounded-lg border border-transparent text-indigo-600 hover:text-indigo-800">Voir</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
