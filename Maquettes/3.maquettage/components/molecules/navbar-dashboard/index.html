<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">
    <!-- Preline Navbar Molecule (Fixed & Polished) -->
    <header
        class="sticky top-0 inset-x-0 flex flex-wrap md:justify-start md:flex-nowrap z-[48] w-full bg-white border-b border-gray-200 text-sm py-2.5">
        <nav class="max-w-[85rem] mx-auto w-full px-4 sm:px-6 lg:px-8 flex items-center justify-between"
            aria-label="Global">
            <div class="flex items-center gap-x-3">
                <!-- Sidebar Toggle (Mobile) -->
                <div class="lg:hidden">
                    <button type="button"
                        class="py-2.5 px-3 inline-flex justify-center items-center gap-x-2 text-start bg-white border border-gray-200 text-gray-800 text-sm font-medium rounded-lg shadow-sm hover:bg-gray-50 focus:outline-none focus:bg-gray-50"
                        data-hs-overlay="#application-sidebar" aria-controls="application-sidebar"
                        aria-label="Toggle navigation">
                        <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" x2="21" y1="6" y2="6" />
                            <line x1="3" x2="21" y1="12" y2="12" />
                            <line x1="3" x2="21" y1="18" y2="18" />
                        </svg>
                    </button>
                </div>

            </div>

            <div class="flex flex-row items-center justify-end gap-x-3">
                <!-- Theme Toggle -->
                <button type="button"
                    class="hs-dark-mode-active:hidden block hs-dark-mode py-2 px-3 text-gray-600 hover:bg-gray-100 rounded-lg transition"
                    data-hs-theme-click-value="dark">
                    <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                    </svg>
                </button>
                <button type="button"
                    class="hs-dark-mode-active:block hidden hs-dark-mode py-2 px-3 text-gray-600 hover:bg-gray-100 rounded-lg transition"
                    data-hs-theme-click-value="theme-default">
                    <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <circle cx="12" cy="12" r="4" />
                        <path d="M12 8V2" />
                        <path d="M12 22v-6" />
                    </svg>
                </button>

                <!-- Notifications -->
                <button type="button"
                    class="relative size-[40px] inline-flex justify-center items-center gap-x-2 text-sm font-semibold rounded-xl border border-gray-200 bg-white text-gray-800 shadow-sm hover:bg-gray-50 transition">
                    <svg class="shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9" />
                        <path d="M10.3 21a1.94 1.94 0 0 0 3.4 0" />
                    </svg>
                    <span class="absolute top-2 right-2 size-2.5 bg-rose-500 rounded-full border-2 border-white"></span>
                </button>

                <!-- Dropdown Account -->
                <div class="hs-dropdown [--placement:bottom-right] relative inline-flex">
                    <button id="hs-dropdown-account" type="button"
                        class="size-[40px] inline-flex justify-center items-center rounded-full border border-gray-200 hover:bg-indigo-50 hover:border-indigo-200 transition">
                        <img class="shrink-0 size-8 rounded-full"
                            src="https://images.unsplash.com/photo-1531123897727-8f129e1688ce?q=80&w=1587&auto=format&fit=facearea&facepad=3&w=320&h=320&q=80"
                            alt="Avatar">
                    </button>
                    <!-- Menu (Preline) -->
                    <div class="hs-dropdown-menu hs-dropdown-open:opacity-100 w-60 transition-[opacity,margin] duration opacity-0 hidden z-10 bg-white border border-gray-200 rounded-2xl shadow-lg p-2 mt-2"
                        role="menu">
                        <div class="py-3 px-5 -m-2 bg-gray-50 rounded-t-2xl font-bold text-gray-900 text-sm">Salma
                            Akajou</div>
                        <div class="p-1 space-y-1 mt-1">
                            <a class="flex items-center gap-x-3 py-2 px-3 text-sm text-gray-700 rounded-lg hover:bg-gray-100 transition"
                                href="#">Mon Profil</a>
                            <a class="flex items-center gap-x-3 py-2 px-3 text-sm text-gray-700 rounded-lg hover:bg-gray-100 transition"
                                href="#">Paramètres</a>
                            <div class="h-px bg-gray-100 my-1"></div>
                            <a class="flex items-center gap-x-3 py-2 px-3 text-sm text-rose-600 rounded-lg hover:bg-rose-50 transition"
                                href="../login.html">Déconnexion</a>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
    </header>
</body>

</html>
