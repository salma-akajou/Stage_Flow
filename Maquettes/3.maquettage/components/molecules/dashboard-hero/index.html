<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
</head>

<body class="p-10 bg-slate-50">
    <!-- Dashboard Hero Molecule -->
    <div class="relative overflow-hidden bg-slate-900 rounded-[3rem] p-8 md:p-12 shadow-2xl">
        <!-- Abstract Background Decorations -->
        <div
            class="absolute top-0 right-0 -translate-y-12 translate-x-12 size-96 bg-indigo-500/20 rounded-full blur-[100px]">
        </div>
        <div
            class="absolute bottom-0 left-0 translate-y-12 -translate-x-12 size-96 bg-purple-500/20 rounded-full blur-[100px]">
        </div>

        <div class="relative z-10 flex flex-col md:flex-row items-center gap-10">
            <div class="flex-1 text-center md:text-left">
                <span
                    class="inline-flex items-center gap-x-1.5 py-1.5 px-3 rounded-full text-xs font-bold bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 mb-6 uppercase tracking-widest">
                    Activé ce mois
                </span>
                <h1 class="text-4xl md:text-5xl font-black font-['Outfit'] text-white mb-6 leading-tight">
                    Trouvez votre <span
                        class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 italic">FuturStage</span>.
                    ✨
                </h1>
                <p class="text-slate-400 text-lg mb-8 max-w-xl">
                    3 entreprises attendent que vous postuliez. Optimisez votre CV pour maximiser vos chances de
                    réussite.
                </p>
                <div class="flex flex-wrap gap-4 justify-center md:justify-start">
                    <button
                        class="py-4 px-8 inline-flex items-center gap-x-2 text-sm font-bold rounded-2xl bg-indigo-600 text-white hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-500/20 hover:scale-[1.02] active:scale-95">
                        Explorer maintenant
                    </button>
                    <button
                        class="py-4 px-8 inline-flex items-center gap-x-2 text-sm font-bold rounded-2xl bg-white/10 text-white hover:bg-white/20 transition-all backdrop-blur-md border border-white/10 hover:scale-[1.02]">
                        Mon Profil
                    </button>
                </div>
            </div>
            <div class="hidden lg:block w-72 h-72">
                <img src="https://cdni.iconscout.com/illustration/premium/thumb/female-executive-working-on-laptop-at-office-desk-illustration-download-in-svg-png-gif-file-formats--project-management-workplace-startup-pack-business-illustrations-4864117.png"
                    alt="Illustration" class="w-full h-full object-contain filter drop-shadow-2xl animate-pulse">
            </div>
        </div>
    </div>
</body>

</html>
