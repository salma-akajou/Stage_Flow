<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-10 bg-white">
    <div class="space-y-4">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Pagination</h3>
        <nav class="flex items-center -x-px gap-2">
            <button type="button"
                class="min-w-[40px] flex justify-center items-center text-slate-800 hover:bg-slate-100 py-2.5 text-sm rounded-xl disabled:opacity-50 disabled:pointer-events-none">
                <svg class="flex-shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="m15 18-6-6 6-6" />
                </svg>
            </button>
            <button type="button"
                class="min-w-[40px] flex justify-center items-center text-slate-800 hover:bg-slate-100 py-2.5 text-sm rounded-xl"
                aria-current="page">1</button>
            <button type="button"
                class="min-w-[40px] flex justify-center items-center bg-indigo-600 text-white py-2.5 text-sm rounded-xl">2</button>
            <button type="button"
                class="min-w-[40px] flex justify-center items-center text-slate-800 hover:bg-slate-100 py-2.5 text-sm rounded-xl">3</button>
            <button type="button"
                class="min-w-[40px] flex justify-center items-center text-slate-800 hover:bg-slate-100 py-2.5 text-sm rounded-xl disabled:opacity-50 disabled:pointer-events-none">
                <svg class="flex-shrink-0 size-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6" />
                </svg>
            </button>
        </nav>
    </div>
</body>

</html>
