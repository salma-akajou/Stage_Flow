<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&display=swap" rel="stylesheet">
</head>

<body class="p-10 bg-slate-50 flex justify-center">
    <!-- Auth Card Molecule -->
    <div
        class="bg-white rounded-[2.5rem] shadow-2xl shadow-indigo-100/50 border border-slate-100 p-8 lg:p-10 w-full max-w-sm relative overflow-hidden">
        <!-- Decoration Gradient -->
        <div class="absolute -top-10 -right-10 w-40 h-40 bg-indigo-50/50 rounded-full blur-3xl opacity-50"></div>

        <div class="text-center mb-10 relative z-10">
            <h2 class="text-2xl font-black font-heading text-slate-900 mb-2">Bon retour ! 👋</h2>
            <p class="text-xs font-medium text-slate-500">Heureux de vous revoir sur StageFlow.</p>
        </div>

        <form class="space-y-6 relative z-10">
            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Email
                    professionnel</label>
                <input type="email"
                    class="py-3.5 px-5 block w-full border-slate-200 rounded-2xl text-sm focus:border-indigo-500 focus:ring-indigo-500 transition-all font-medium"
                    placeholder="nom@exemple.com" required>
            </div>
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Mot de
                        passe</label>
                    <a class="text-xs font-bold text-indigo-600 hover:text-indigo-700 decoration-2 hover:underline focus:outline-none"
                        href="#">Oublié ?</a>
                </div>
                <input type="password"
                    class="py-3.5 px-5 block w-full border-slate-200 rounded-2xl text-sm focus:border-indigo-500 focus:ring-indigo-500 transition-all font-medium"
                    placeholder="••••••••" required>
            </div>
            <button type="button"
                class="w-full py-4 px-6 inline-flex justify-center items-center gap-x-2 text-sm font-bold rounded-2xl border border-transparent bg-indigo-600 text-white hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all hover:scale-[1.02] active:scale-[0.98]">
                Se connecter
            </button>
        </form>
    </div>
</body>

</html>
