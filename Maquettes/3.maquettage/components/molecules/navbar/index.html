<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white">
    <!-- Navbar Molecule Refined -->
    <header
        class="sticky top-0 inset-x-0 flex flex-wrap sm:justify-start sm:flex-nowrap z-50 w-full bg-white/80 border-b border-slate-200 text-sm py-3 sm:py-0 backdrop-blur-md">
        <nav class="relative max-w-[85rem] w-full mx-auto px-4 sm:flex sm:items-center sm:justify-between sm:px-6 lg:px-8"
            aria-label="Global">
            <div class="flex items-center justify-between">
                <a class="flex-none text-xl font-bold font-heading inline-flex items-center gap-x-2" href="#"
                    aria-label="StageFlow">
                    <img src="../../../images/logo_app.png" alt="Logo" class="size-8 object-contain">
                    <span class="text-slate-900">StageFlow</span>
                </a>
                <div class="sm:hidden">
                    <button type="button"
                        class="hs-collapse-toggle size-9 flex justify-center items-center text-sm font-semibold rounded-lg border border-slate-200 text-slate-800 hover:bg-slate-100 disabled:opacity-50 disabled:pointer-events-none"
                        data-hs-collapse="#navbar-collapse" aria-controls="navbar-collapse"
                        aria-label="Toggle navigation">
                        <svg class="hs-collapse-open:hidden flex-shrink-0 size-4" xmlns="http://www.w3.org/2000/svg"
                            width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" x2="21" y1="6" y2="6" />
                            <line x1="3" x2="21" y1="12" y2="12" />
                            <line x1="3" x2="21" y1="18" y2="18" />
                        </svg>
                        <svg class="hs-collapse-open:block hidden flex-shrink-0 size-4"
                            xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M18 6 6 18" />
                            <path d="m6 6 12 12" />
                        </svg>
                    </button>
                </div>
            </div>
            <div id="navbar-collapse"
                class="hidden overflow-hidden transition-all duration-300 basis-full grow sm:block">
                <div
                    class="flex flex-col gap-y-4 gap-x-0 mt-5 sm:flex-row sm:items-center sm:justify-end sm:gap-y-0 sm:gap-x-7 sm:mt-0 sm:ps-7">
                    <a class="font-semibold text-indigo-600 sm:py-6" href="#" aria-current="page">Accueil</a>
                    <a class="font-medium text-slate-600 hover:text-indigo-600 sm:py-6 transition" href="#">Offres</a>
                    <a class="font-medium text-slate-600 hover:text-indigo-600 sm:py-6 transition"
                        href="#">Entreprises</a>
                    <a class="font-medium text-slate-600 hover:text-indigo-600 sm:py-6 transition" href="#">Contact</a>

                    <!-- Dark Mode Toggle -->
                    <button type="button"
                        class="hs-dark-mode-active:hidden block hs-dark-mode group flex items-center text-slate-600 hover:text-indigo-600 font-medium transition"
                        data-hs-theme-click-value="dark">
                        <svg class="flex-shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z" />
                        </svg>
                    </button>
                    <button type="button"
                        class="hs-dark-mode-active:block hidden hs-dark-mode group flex items-center text-slate-600 hover:text-indigo-600 font-medium transition"
                        data-hs-theme-click-value="theme-default">
                        <svg class="flex-shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="4" />
                            <path d="M12 8V2" />
                            <path d="M12 22v-6" />
                            <path d="m8 8-5-5" />
                            <path d="m21 21-5-5" />
                            <path d="M8 12H2" />
                            <path d="M22 12h-6" />
                            <path d="m8 16-5 5" />
                            <path d="m21 3-5 5" />
                        </svg>
                    </button>

                    <div class="flex items-center gap-x-3">
                        <a class="py-2 px-3 inline-flex items-center gap-x-2 text-xs font-semibold rounded-lg border border-slate-200 bg-white text-slate-800 shadow-sm hover:bg-slate-50 transition"
                            href="login.html">
                            Connexion
                        </a>
                        <a class="py-2 px-3 inline-flex items-center gap-x-2 text-xs font-semibold rounded-lg border border-transparent bg-indigo-600 text-white hover:bg-indigo-700 transition"
                            href="register.html">
                            S'inscrire
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
</body>

</html>
