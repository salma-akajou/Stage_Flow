<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.js" defer></script>
</head>

<body class="p-10 bg-slate-100 flex flex-col gap-8">
    <div class="space-y-4">
        <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Alertes</h3>

        <div class="bg-emerald-50 border-t-2 border-emerald-500 rounded-xl p-4" role="alert">
            <div class="flex">
                <div class="flex-shrink-0">
                    <span
                        class="inline-flex justify-center items-center size-8 rounded-full border-4 border-emerald-100 bg-emerald-200 text-emerald-800">
                        <svg class="flex-shrink-0 size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z" />
                            <path d="m9 12 2 2 4-4" />
                        </svg>
                    </span>
                </div>
                <div class="ms-3">
                    <h3 class="text-slate-800 font-semibold italic text-sm">Candidature envoyée !</h3>
                    <p class="text-sm text-slate-700 mt-1">L'entreprise a bien reçu votre demande de stage.</p>
                </div>
            </div>
        </div>

        <div class="bg-rose-50 border-s-4 border-rose-500 p-4 rounded-xl" role="alert">
            <div class="flex">
                <div class="flex-shrink-0">
                    <svg class="flex-shrink-0 size-4 text-rose-500 mt-0.5" xmlns="http://www.w3.org/2000/svg" width="24"
                        height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" x2="12" y1="8" y2="12" />
                        <line x1="12" x2="12.01" y1="16" y2="16" />
                    </svg>
                </div>
                <div class="ms-3">
                    <p class="text-sm text-rose-700 font-medium">Erreur : Veuillez remplir tous les champs obligatoires.
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
