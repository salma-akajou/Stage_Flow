<!DOCTYPE html>
<html lang="fr" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Récupération de compte - StageFlow</title>
    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.js" defer></script>
    <!-- AOS Animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81', 950: '#1e1b4b' },
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .font-heading {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="bg-[#fafbfc] min-h-full flex flex-col items-center justify-center relative overflow-x-hidden py-12">

    <!-- Background Decor (Marble Style) -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <div
            class="absolute top-[-15%] left-[-10%] size-[800px] bg-gradient-to-br from-indigo-500/15 via-purple-500/10 to-transparent rounded-full blur-[140px] animate-pulse">
        </div>
        <div class="absolute bottom-[-15%] right-[-10%] size-[800px] bg-gradient-to-tr from-purple-500/15 via-indigo-500/10 to-transparent rounded-full blur-[140px] animate-pulse"
            style="animation-delay: 3s;"></div>
    </div>

    <main class="w-full max-w-md p-6 relative z-10" data-aos="zoom-in">
        <!-- Logo -->
        <div class="text-center mb-10">
            <a href="landing.html" class="inline-flex items-center gap-x-3 group">
                <img src="../images/logo_app.png" alt="Logo"
                    class="size-10 object-contain group-hover:rotate-12 transition-transform">
                <span class="text-2xl font-black font-heading text-slate-900 tracking-tight">StageFlow</span>
            </a>
        </div>

        <!-- Auth Card (Molecule: auth-card) -->
        <div
            class="bg-white rounded-[3rem] shadow-2xl shadow-indigo-100/50 border border-slate-100 p-8 lg:p-12 relative overflow-hidden">
            <!-- Decoration Gradient (from molecule) -->
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-indigo-50/50 rounded-full blur-3xl opacity-50"></div>
            <div class="text-center mb-8">
                <div
                    class="size-16 bg-indigo-50 rounded-2xl flex items-center justify-center mx-auto mb-6 text-indigo-600">
                    <svg class="size-8" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect width="20" height="12" x="2" y="9" rx="2" />
                        <circle cx="12" cy="15" r="3" />
                        <path d="M17 9V7a5 5 0 0 0-10 0v2" />
                    </svg>
                </div>
                <h1 class="text-2xl font-black font-heading text-slate-900 mb-2">Mot de passe oublié ?</h1>
                <p class="text-xs font-medium text-slate-500 leading-relaxed">Pas de panique ! Saisissez votre email et
                    nous vous enverrons un lien de réinitialisation.</p>
            </div>

            <form action="#" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Email
                        professionnel</label>
                    <input type="email"
                        class="py-3.5 px-5 block w-full border-slate-200 rounded-2xl text-sm focus:border-indigo-500 focus:ring-indigo-500 transition-all font-medium"
                        placeholder="nom@exemple.com" required>
                </div>

                <button type="submit"
                    class="w-full py-4 px-6 inline-flex justify-center items-center gap-x-2 text-sm font-bold rounded-2xl border border-transparent bg-indigo-600 text-white hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all hover:scale-[1.02] active:scale-[0.98]">
                    Envoyer le lien
                </button>
            </form>

            <!-- Footer -->
            <p class="mt-8 text-center text-sm font-medium text-slate-500 border-t border-slate-50 pt-6">
                <a class="text-indigo-600 font-bold hover:text-indigo-700 transition inline-flex items-center gap-2"
                    href="login.html">
                    <svg class="size-4" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="m15 18-6-6 6-6" />
                    </svg>
                    Retour à la connexion
                </a>
            </p>
        </div>

        <div class="mt-8 text-center">
            <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">© 2026 StageFlow Maroc</p>
        </div>
    </main>

    <script>
        AOS.init({ once: true, duration: 800 });
    </script>
</body>

</html>
