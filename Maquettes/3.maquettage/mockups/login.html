<!DOCTYPE html>
<html lang="fr" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - StageFlow</title>
    <!-- Frameworks -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/preline/dist/preline.js" defer></script>
    <!-- AOS Animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <!-- Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81', 950: '#1e1b4b' },
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], heading: ['Outfit', 'sans-serif'] },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 8s ease-in-out infinite 1s',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px) rotate(0deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(5deg)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .font-heading {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<body class="bg-[#fafbfc] min-h-full flex flex-col items-center justify-center relative overflow-x-hidden py-12">

    <!-- Background Decor (Marble/Vibrant Style) -->
    <div class="fixed inset-0 pointer-events-none z-0">
        <!-- Marble Blobs with Brand Colors -->
        <div
            class="absolute top-[-15%] left-[-10%] size-[800px] bg-gradient-to-br from-indigo-500/15 via-purple-500/10 to-transparent rounded-full blur-[140px] animate-pulse">
        </div>
        <div class="absolute bottom-[-15%] right-[-10%] size-[800px] bg-gradient-to-tr from-purple-500/15 via-indigo-500/10 to-transparent rounded-full blur-[140px] animate-pulse"
            style="animation-delay: 3s;"></div>

        <!-- Center Accent -->
        <div
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 size-[500px] bg-indigo-400/5 rounded-full blur-[100px]">
        </div>
    </div>

    <main class="w-full max-w-md p-6 relative z-10" data-aos="zoom-in">
        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="landing.html" class="inline-flex items-center gap-x-3 group">
                <img src="../images/logo_app.png" alt="Logo"
                    class="size-10 object-contain group-hover:rotate-12 transition-transform">
                <span class="text-2xl font-black font-heading text-slate-900 tracking-tight">StageFlow</span>
            </a>
        </div>

        <!-- Auth Card (Molecule: auth-card) -->
        <div
            class="bg-white rounded-[2.5rem] shadow-2xl shadow-indigo-100/50 border border-slate-100 p-8 lg:p-10 relative overflow-hidden">
            <!-- Decoration Gradient (from molecule) -->
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-indigo-50/50 rounded-full blur-3xl opacity-50"></div>

            <div class="text-center mb-10 relative z-10">
                <h1 class="text-2xl font-black font-heading text-slate-900 mb-2">Bon retour ! 👋</h1>
                <p class="text-xs font-medium text-slate-500">Heureux de vous revoir sur StageFlow.</p>
            </div>

            <form action="#" class="space-y-5">
                <!-- Email -->
                <div>
                    <label for="email"
                        class="block text-xs font-bold uppercase tracking-widest text-slate-400 mb-2 ml-1">Email
                        professionnel</label>
                    <input type="email" id="email" name="email"
                        class="py-3 px-5 block w-full border-slate-200 rounded-2xl text-sm focus:border-indigo-500 focus:ring-indigo-500 transition-all font-medium"
                        placeholder="nom@exemple.com" required>
                </div>

                <!-- Password -->
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label for="password"
                            class="block text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Mot de
                            passe</label>
                        <a class="text-xs font-bold text-indigo-600 hover:text-indigo-700 focus:outline-none"
                            href="forgot-password.html">Oublié ?</a>
                    </div>
                    <input type="password" id="password" name="password"
                        class="py-3 px-5 block w-full border-slate-200 rounded-2xl text-sm focus:border-indigo-500 focus:ring-indigo-500 transition-all font-medium"
                        placeholder="••••••••" required>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox"
                        class="shrink-0 border-slate-300 rounded text-indigo-600 focus:ring-indigo-500">
                    <label for="remember-me" class="ms-3 text-sm font-medium text-slate-600">Se souvenir de moi</label>
                </div>

                <!-- Submit -->
                <button type="submit"
                    class="w-full py-4 px-6 inline-flex justify-center items-center gap-x-2 text-sm font-bold rounded-2xl border border-transparent bg-indigo-600 text-white hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all hover:scale-[1.02] active:scale-[0.98]">
                    Accéder à mon espace
                </button>
            </form>

            <!-- Footer Card -->
            <p class="mt-8 text-center text-sm font-medium text-slate-500 border-t border-slate-50 pt-6">
                Pas encore de compte ?
                <a class="text-indigo-600 font-bold hover:text-indigo-700 transition" href="register.html">
                    S'inscrire
                </a>
            </p>
        </div>

        <!-- Extra Footer -->
        <div class="mt-8 text-center">
            <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400">© 2026 StageFlow Maroc</p>
        </div>
    </main>

    <script>
        AOS.init({ once: true, duration: 800 });
    </script>
</body>

</html>
